<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бит Майт.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-family: 'Arial', sans-serif;
            font-size: 10vw;
            color: #b000ff;
            text-shadow: 
                0 0 10px #b000ff,
                0 0 20px #b000ff,
                0 0 40px #9000ff;
            letter-spacing: 0.05em;
            z-index: 10;
            position: relative;
            user-select: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="title">Бит Майт.</div>
    <canvas id="snowCanvas"></canvas>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const snowflakes = [];
        const MAX_FLAKES = 300;

        let windX = 0;
        let windTarget = 0;
        let gustTimer = 0;

        class Snowflake {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * canvas.width * 1.5 - canvas.width * 0.25;
                this.y = initial ? Math.random() * canvas.height : -10;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.7 + 0.3;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.01;
            }

            update() {
                this.wobble += this.wobbleSpeed;
                const turbulence = Math.sin(this.wobble) * 0.5;
                this.x += this.speedX + windX + turbulence;
                this.y += this.speedY;

                if (this.y > canvas.height + 10 || this.x > canvas.width + 50 || this.x < -50) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(176, 0, 255, ${this.opacity})`;
                ctx.shadowBlur = this.size * 3;
                ctx.shadowColor = '#b000ff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < MAX_FLAKES; i++) {
            snowflakes.push(new Snowflake());
        }

        function updateWind() {
            gustTimer--;
            if (gustTimer <= 0) {
                windTarget = (Math.random() - 0.3) * 8;
                gustTimer = Math.random() * 120 + 60;
            }
            windX += (windTarget - windX) * 0.02;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateWind();
            snowflakes.forEach(flake => {
                flake.update();
                flake.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
